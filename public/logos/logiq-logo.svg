<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#0d1527"/>

  <!-- Defs for gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>

  <!-- Main gradient circle -->
  <circle cx="128" cy="128" r="110" fill="url(#grad1)"/>

  <!-- Inner dark circle (ring effect) -->
  <circle cx="128" cy="128" r="95" fill="#0d1527"/>

  <!-- LogIQ Text -->
  <text x="128" y="150" font-family="Arial, sans-serif" font-size="68" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="-1">LogIQ</text>

  <!-- Analytics/Dashboard icon (3 bars) -->
  <g opacity="0.7" transform="translate(128, 55)">
    <!-- Bar 1 (short) -->
    <rect x="-20" y="0" width="12" height="24" fill="url(#grad1)" rx="2"/>
    <!-- Bar 2 (medium) -->
    <rect x="-4" y="-8" width="12" height="32" fill="url(#grad1)" rx="2"/>
    <!-- Bar 3 (tall) -->
    <rect x="12" y="-16" width="12" height="40" fill="url(#grad1)" rx="2"/>
  </g>

  <!-- Decorative dots (data points) -->
  <g fill="url(#grad1)" opacity="0.6">
    <circle cx="55" cy="128" r="4"/>
    <circle cx="201" cy="128" r="4"/>
    <circle cx="128" cy="55" r="4"/>
    <circle cx="128" cy="201" r="4"/>
  </g>

  <!-- Corner accents -->
  <g fill="#FF9900" opacity="0.4">
    <rect x="40" y="40" width="16" height="4" rx="2"/>
    <rect x="40" y="40" width="4" height="16" rx="2"/>

    <rect x="200" y="40" width="16" height="4" rx="2"/>
    <rect x="212" y="40" width="4" height="16" rx="2"/>

    <rect x="40" y="212" width="16" height="4" rx="2"/>
    <rect x="40" y="200" width="4" height="16" rx="2"/>

    <rect x="200" y="212" width="16" height="4" rx="2"/>
    <rect x="212" y="200" width="4" height="16" rx="2"/>
  </g>
</svg>